services:
  bitcoincash-ckpool:
    build:
      context: ckpool/
    container_name: bitcoincash-ckpool
    # Restart the container automatically if it exits:
    restart: always
    # Define environment variables to fill the config files at runtime:
    healthcheck:
      test: ["CMD", "bash", "/healthcheck.sh"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 60s
    environment:
      # Bitcoin Cash Node config
      TESTNET: "${TESTNET:-0}"
      DAEMON: "${DAEMON:-1}"
      SERVER: "${SERVER:-1}"
      TXINDEX: "${TXINDEX:-0}"
      PRUNE: "${PRUNE:-550}"
      MAXCONNECTIONS: "${MAXCONNECTIONS:-300}"
      DISABLEWALLET: "${DISABLEWALLET:-0}"
      RPCALLOWIP: "${RPCALLOWIP:-0.0.0.0/0}"
      PORT: "${PORT:-8333}"
      RPCPORT: "${RPCPORT:-8332}"
      RPCBIND: "${RPCBIND:-0.0.0.0}"
      RPCUSER: "${RPCUSER:-rpcuser}"
      RPCPASSWORD: "${RPCPASSWORD:-rpcpassword}"
      ONLYNET: "${ONLYNET:-IPv4}"
      ZMQPUBHASHBLOCK: "${ZMQPUBHASHBLOCK:-tcp://127.0.0.1:28333}"
      DATADIR: "${DATADIR:-/home/bitcoin/.bitcoin}"
      WAIT_FOR_FULL_SYNC: "${WAIT_FOR_FULL_SYNC:-0}"

      # ckpool config
      BTCD_URL: "${BTCD_URL:-127.0.0.1:8332}"
      BTCD_AUTH: "${BTCD_AUTH:-rpcuser}"
      BTCD_PASS: "${BTCD_PASS:-rpcpassword}"
      SERVERURL: "${SERVERURL:-0.0.0.0:3333}"
      BTCADDRESS: "${BTCADDRESS:-replace_with_bch_address}"
      BTCSIG: "${BTCSIG:-/mined by me/}"
      BLOCKPOLL: "${BLOCKPOLL:-50}"
      DONATION: "${DONATION:-0.0}"
      NONCE1LENGTH: "${NONCE1LENGTH:-4}"
      NONCE2LENGTH: "${NONCE2LENGTH:-8}"
      UPDATE_INTERVAL: "${UPDATE_INTERVAL:-5}"
      VERSION_MASK: "${VERSION_MASK:-1fffe000}"
      MINDIFF: "${MINDIFF:-500000}"
      STARTDIFF: "${STARTDIFF:-500000}"
      LOGDIR: "${LOGDIR:-/logs}"
      ZMQBLOCK: "${ZMQBLOCK:-tcp://127.0.0.1:28333}"

    volumes:
      - ./ckpool/data:/home/bitcoin/.bitcoin
      - ./ckpool/data/logs:/logs

    ports:
      # Publish Bitcoin Cash Node ports:
      - "8333:8333"  # p2p
      # Publish Bitcoin Cash Node RPC port:
      - "8332:8332"  # rpc
      # Publish ckpool port (if you want to accept external connections for miners):
      - "3333:3333"
      # API port (for ckstats):
      - "4028:4028"
      # API port (for ckstats):
      - "3001:80"

  db:
    image: postgres:13
    # Restart the container automatically if it exits:
    restart: always
    container_name: db
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ckstats}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ckstats}"
      POSTGRES_DB: "${POSTGRES_DB:-ckstats}"
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ckstats -t 20 && psql -U ckstats -d dbshadow -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 20s
      timeout: 30s
      retries: 5
  ckstats:
    build:
      context: ckstats/
      dockerfile: Dockerfile
    container_name: ckstats
    # Restart the container automatically if it exits:
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://ckstats:ckstats@db/ckstats}"
      SHADOW_DATABASE_URL: "${SHADOW_DATABASE_URL:-postgres://ckstats:ckstats@db/dbshadow}"
      API_URL: "${API_URL:-http://bitcoincash-ckpool:4028}"
      RPCUSER: "${RPCUSER:-rpcuser}"
      RPCPASSWORD: "${RPCPASSWORD:-rpcpassword}"
      RPCPORT: "${RPCPORT:-8332}"
      WAIT_FOR_FULL_SYNC: "${WAIT_FOR_FULL_SYNC:-0}"
    ports:
    # Publish ckstats port:
      - "3000:3000"



